<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Boda - Cybele & Juan</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #000;
            display: flex; flex-direction: column; align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        img { width: 100%; max-width: 1000px; height: auto; display: block; }

        /* --- Contador --- */
        #countdown-container {
            color: white; text-align: center; padding: 60px 10px 30px 10px;
            background: linear-gradient(to bottom, #000, #111);
            width: 100%; max-width: 1000px; box-sizing: border-box;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
        }

        .countdown-title {
            font-weight: 300; letter-spacing: 4px; margin-bottom: 30px;
            color: #d4af37; font-size: 1.1rem; text-transform: uppercase;
        }

        .timer { display: flex; justify-content: center; gap: 8px; }

        .time-segment {
            display: flex; flex-direction: column; align-items: center;
            min-width: 65px; background: rgba(255, 255, 255, 0.03);
            padding: 12px 2px; border-radius: 6px; border: 1px solid rgba(212, 175, 55, 0.1);
        }

        .number { font-size: 1.8rem; font-weight: bold; color: #fff; }
        .label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; color: #d4af37; }

        /* --- Botón Estilo "Task" --- */
        .task-section {
            background-color: #111; width: 100%; max-width: 1000px;
            text-align: center; padding-bottom: 80px;
        }

        .btn-task {
            text-decoration: none; color: #fff; background-color: #4285F4; /* Azul Google Task */
            padding: 15px 30px; border-radius: 30px; font-size: 13px;
            letter-spacing: 1px; text-transform: uppercase; font-weight: bold;
            transition: all 0.3s ease; display: inline-block;
            box-shadow: 0 4px 15px rgba(66, 133, 244, 0.3);
        }

        .btn-task:hover { transform: scale(1.05); background-color: #357ae8; }

        /* --- UI Invitación --- */
        #music-btn {
            position: fixed; top: 20px; right: 20px; z-index: 2000;
            background: rgba(255, 255, 255, 0.6); border: none; border-radius: 50%;
            width: 50px; height: 50px; cursor: pointer; font-size: 22px; display: none;
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); color: white;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 1000; cursor: pointer; text-align: center; padding: 20px;
        }

        .rotate-icon { font-size: 40px; margin-bottom: 15px; animation: rotate 2s infinite; }
        @keyframes rotate { 0% { transform: rotate(0deg); } 50% { transform: rotate(90deg); } 100% { transform: rotate(0deg); } }
    </style>
</head>
<body>

    <button id="music-btn" onclick="toggleMusic()">🔊</button>

    <div id="overlay" onclick="startInvitation()">
        <h2 style="letter-spacing: 3px; font-weight: 300;">BIENVENIDOS</h2>
        <div class="rotate-icon">🔄</div>
        <p>Gira tu teléfono para apreciar mejor</p>
        <p style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 20px;">
            Toca para abrir la invitación ✉️
        </p>
    </div>

    <audio id="player" loop>
        <source src="musica.mp4" type="audio/mp4">
    </audio>

    <img src="1.png"><img src="2.png"><img src="3.png"><img src="4.png">
    <img src="5.png"><img src="6.png"><img src="7.png"><img src="8.png">

    <div id="countdown-container">
        <h2 class="countdown-title">Faltan solo...</h2>
        <div class="timer">
            <div class="time-segment"><span id="months" class="number">00</span><span class="label">Meses</span></div>
            <div class="time-segment"><span id="days" class="number">00</span><span class="label">Días</span></div>
            <div class="time-segment"><span id="hours" class="number">00</span><span class="label">Hs</span></div>
            <div class="time-segment"><span id="minutes" class="number">00</span><span class="label">Min</span></div>
            <div class="time-segment"><span id="seconds" class="number">00</span><span class="label">Seg</span></div>
        </div>
    </div>

    <div class="task-section">
        <a href="https://www.google.com/calendar/render?action=TEMPLATE&text=%F0%9F%92%8D+Boda+Cybele+%26+Juan&dates=20260829/20260830&details=%C2%A1D%C3%ADa+de+la+Boda!+No+olvidar+asistir.&sf=true&output=embed" 
           target="_blank" 
           class="btn-task">
           📝 Anotar en mis Tareas
        </a>
    </div>

    <script>
        var audio = document.getElementById('player');
        var btn = document.getElementById('music-btn');

        function startInvitation() {
            document.getElementById('overlay').style.display = 'none';
            btn.style.display = 'block';
            audio.play();
        }

        function toggleMusic() {
            if (audio.paused) { audio.play(); btn.innerHTML = "🔊"; } 
            else { audio.pause(); btn.innerHTML = "🔇"; }
        }

        const fechaEvento = new Date(2026, 7, 29, 21, 0, 0);

        function actualizarContador() {
            const ahora = new Date();
            let diff = fechaEvento - ahora;

            if (diff <= 0) {
                document.getElementById("countdown-container").innerHTML = "<h2 class='countdown-title'>¡LLEGÓ EL MOMENTO! 🥂</h2>";
                return;
            }

            let meses = (fechaEvento.getFullYear() - ahora.getFullYear()) * 12 + (fechaEvento.getMonth() - ahora.getMonth());
            let copiaAhora = new Date(ahora.getTime());
            copiaAhora.setMonth(copiaAhora.getMonth() + meses);

            if (copiaAhora > fechaEvento) {
                meses--;
                copiaAhora = new Date(ahora.getTime());
                copiaAhora.setMonth(copiaAhora.getMonth() + meses);
            }

            let restoDiff = fechaEvento - copiaAhora;
            const dias = Math.floor(restoDiff / (1000 * 60 * 60 * 24));
            const horas = Math.floor((restoDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutos = Math.floor((restoDiff % (1000 * 60 * 60)) / (1000 * 60));
            const segundos = Math.floor((restoDiff % (1000 * 60)) / 1000);

            document.getElementById("months").innerText = meses;
            document.getElementById("days").innerText = dias;
            document.getElementById("hours").innerText = horas;
            document.getElementById("minutes").innerText = minutos;
            document.getElementById("seconds").innerText = segundos;
        }

        setInterval(actualizarContador, 1000);
        actualizarContador();
    </script>
</body>
</html>

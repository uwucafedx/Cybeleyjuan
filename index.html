<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Boda - Cybele & Juan</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Contenedor que recorta los bordes negros de las fotos 1920x1080 */
        .image-container {
            width: 100%;
            max-width: 500px; /* Ancho ideal para móvil */
            overflow: hidden; /* Corta lo que sobre a los lados */
            display: flex;
            justify-content: center;
        }

        img {
            width: 177%; /* Zoom para eliminar los márgenes laterales de una imagen 16:9 */
            height: auto;
            display: block;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
            text-align: center;
            font-family: 'Segoe UI', sans-serif;
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="startInvitation()">
        <h2 style="letter-spacing: 3px;">BIENVENIDOS</h2>
        <p>Toca para abrir la invitación</p>
        <span style="font-size: 30px;">✉️</span>
    </div>

    <audio id="player" loop>
        <source src="musica.mp4" type="audio/mp4">
    </audio>

    <div class="image-container"><img src="1.png"></div>
    <div class="image-container"><img src="2.png"></div>
    <div class="image-container"><img src="3.png"></div>
    <div class="image-container"><img src="4.png"></div>
    <div class="image-container"><img src="5.png"></div>
    <div class="image-container"><img src="6.png"></div>
    <div class="image-container"><img src="7.png"></div>
    <div class="image-container"><img src="8.png"></div>

    <script>
        function startInvitation() {
            var audio = document.getElementById('player');
            document.getElementById('overlay').style.display = 'none';
            audio.play();
        }
    </script>

</body>
</html>

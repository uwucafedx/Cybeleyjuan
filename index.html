<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Boda - Cybele & Juan</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Imágenes al ancho completo del dispositivo sin recortes extra */
        img {
            width: 100%;
            max-width: 600px; /* Tamaño máximo para que no se vea gigante en PC */
            height: auto;
            display: block;
        }

        /* Botón para parar/poner música */
        #music-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            background: rgba(255, 255, 255, 0.6);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            font-size: 22px;
            display: none;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
            text-align: center;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <button id="music-btn" onclick="toggleMusic()">🔊</button>

    <div id="overlay" onclick="startInvitation()">
        <h2 style="letter-spacing: 2px;">BIENVENIDOS</h2>
        <p>Toca para abrir la invitación</p>
        <span>✉️</span>
    </div>

    <audio id="player" loop>
        <source src="musica.mp4" type="audio/mp4">
    </audio>

    <img src="1.png">
    <img src="2.png">
    <img src="3.png">
    <img src="4.png">
    <img src="5.png">
    <img src="6.png">
    <img src="7.png">
    <img src="8.png">

    <script>
        var audio = document.getElementById('player');
        var btn = document.getElementById('music-btn');

        function startInvitation() {
            document.getElementById('overlay').style.display = 'none';
            btn.style.display = 'block';
            audio.play();
        }

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                btn.innerHTML = "🔊";
            } else {
                audio.pause();
                btn.innerHTML = "🔇";
            }
        }
    </script>

</body>
</html>

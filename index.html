<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        .fondo {
            width: 100vw;
            height: 100vh;
            object-fit: contain; /* Para que se vea la invitación completa */
        }
        .controles-audio {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.7;
            transition: opacity 0.3s;
        }
        .controles-audio:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

    <img src="invitacion.png" alt="Invitación" class="fondo">

    <div class="controles-audio">
        <audio controls autoplay loop>
            <source src="musica.mp4" type="audio/mp4">
            Tu navegador no soporta el elemento de audio.
        </audio>
    </div>

</body>
</html>

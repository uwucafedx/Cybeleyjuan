<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Boda - Cybele & Juan</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        img {
            width: 100%;
            max-width: 1000px; 
            height: auto;
            display: block;
        }

        /* --- Estilos del Contador --- */
        #countdown-container {
            color: white;
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(to bottom, #000, #1a1a1a);
            width: 100%;
            max-width: 1000px;
            box-sizing: border-box;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
        }

        .countdown-title {
            font-weight: 300;
            letter-spacing: 5px;
            margin-bottom: 35px;
            color: #d4af37; /* Dorado */
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .timer {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .time-segment {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 70px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 5px;
            border-radius: 8px;
        }

        .number {
            font-size: 2.2rem;
            font-weight: bold;
            color: #fff;
        }

        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
            color: #d4af37;
            opacity: 0.8;
        }
        /* ---------------------------- */

        #music-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            background: rgba(255, 255, 255, 0.6);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            font-size: 22px;
            display: none;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
            text-align: center;
            padding: 20px;
        }

        .rotate-icon {
            font-size: 40px;
            margin-bottom: 15px;
            animation: rotate 2s infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
            100% { transform: rotate(0deg); }
        }

        .welcome-text {
            letter-spacing: 3px;
            margin-bottom: 20px;
            font-weight: 300;
        }
    </style>
</head>
<body>

    <button id="music-btn" onclick="toggleMusic()">🔊</button>

    <div id="overlay" onclick="startInvitation()">
        <h2 class="welcome-text">BIENVENIDOS</h2>
        <div class="rotate-icon">🔄</div>
        <p style="font-size: 18px; margin: 5px 0;">Gira tu teléfono para apreciar mejor</p>
        <p style="font-size: 16px; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 20px;">
            Toca para abrir la invitación ✉️
        </p>
    </div>

    <audio id="player" loop>
        <source src="musica.mp4" type="audio/mp4">
    </audio>

    <img src="1.png">
    <img src="2.png">
    <img src="3.png">
    <img src="4.png">
    <img src="5.png">
    <img src="6.png">
    <img src="7.png">
    <img src="8.png">

    <div id="countdown-container">
        <h2 class="countdown-title">Faltan solo...</h2>
        <div class="timer">
            <div class="time-segment">
                <span id="days" class="number">00</span>
                <span class="label">Días</span>
            </div>
            <div class="time-segment">
                <span id="hours" class="number">00</span>
                <span class="label">Horas</span>
            </div>
            <div class="time-segment">
                <span id="minutes" class="number">00</span>
                <span class="label">Min.</span>
            </div>
            <div class="time-segment">
                <span id="seconds" class="number">00</span>
                <span class="label">Seg.</span>
            </div>
        </div>
    </div>

    <script>
        var audio = document.getElementById('player');
        var btn = document.getElementById('music-btn');

        function startInvitation() {
            document.getElementById('overlay').style.display = 'none';
            btn.style.display = 'block';
            audio.play();
        }

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                btn.innerHTML = "🔊";
            } else {
                audio.pause();
                btn.innerHTML = "🔇";
            }
        }

        // FECHA CONFIGURADA: 29 de Agosto 2026, 21:00hs (9 PM)
        const fechaBoda = new Date("August 29, 2026 21:00:00").getTime();

        const x = setInterval(function() {
            const ahora = new Date().getTime();
            const distancia = fechaBoda - ahora;

            const dias = Math.floor(distancia / (1000 * 60 * 60 * 24));
            const horas = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutos = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
            const segundos = Math.floor((distancia % (1000 * 60)) / 1000);

            document.getElementById("days").innerHTML = dias;
            document.getElementById("hours").innerHTML = horas;
            document.getElementById("minutes").innerHTML = minutos;
            document.getElementById("seconds").innerHTML = segundos;

            if (distancia < 0) {
                clearInterval(x);
                document.getElementById("countdown-container").innerHTML = "<h2 class='countdown-title'>¡LLEGÓ EL MOMENTO! 🥂</h2>";
            }
        }, 1000);
    </script>

</body>
</html>

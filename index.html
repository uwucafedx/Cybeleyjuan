<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Boda - Cybele & Juan</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }
        /* Pantalla de inicio para activar música */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
            text-align: center;
            font-family: sans-serif;
        }
        img {
            width: 100%;
            max-width: 600px;
            display: block;
            height: auto;
        }
        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="startInvitation()">
        <h2 style="font-weight: 300;">BIENVENIDOS</h2>
        <p>Toca para abrir la invitación</p>
        <span style="font-size: 24px;">✉️</span>
    </div>

    <audio id="player" loop>
        <source src="musica.mp4" type="audio/mp4">
    </audio>

    <img src="1.png">
    <img src="2.png">
    <img src="3.png">
    <img src="4.png">
    <img src="5.png">
    <img src="6.png">
    <img src="7.png">
    <img src="8.png">

    <script>
        function startInvitation() {
            var audio = document.getElementById('player');
            var overlay = document.getElementById('overlay');
            
            // Reproduce el audio
            audio.play().catch(function(error) {
                console.log("El navegador bloqueó el autoplay: ", error);
            });

            // Oculta la pantalla de bienvenida
            overlay.style.display = 'none';
        }
    </script>

</body>
</html>
